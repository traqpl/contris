name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, contris]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Deploy on agent host
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          make deploy-agent \
            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/contris}" \
            PORT="${DEPLOY_PORT:-8072}"
