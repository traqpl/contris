<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARGO SHIFT</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@500;600&display=swap" rel="stylesheet">
<link rel="preload" href="music.ogg" as="audio" type="audio/ogg" crossorigin>
<link rel="preload" href="music_2.ogg" as="audio" type="audio/ogg" crossorigin>
<link rel="preload" href="music_3.ogg" as="audio" type="audio/ogg" crossorigin>
<link rel="preload" href="music_4.ogg" as="audio" type="audio/ogg" crossorigin>
</head>
<body>
<div class="crt theme-amber monitor" id="monitor">

  <div class="toolbar">
    <span class="toolbar-title">◈ CARGO SHIFT</span>
    <div style="display:flex;align-items:center;gap:10px">
      <button id="muteBtn" class="mute-btn" title="Mute / Unmute music">♫</button>
      <label for="themeSelect" class="toolbar-label">THEME</label>
      <select id="themeSelect" class="theme-select">
        <option value="theme-amber" selected>AMBER</option>
        <option value="theme-green">GREEN</option>
        <option value="theme-cyan">CYAN</option>
      </select>
    </div>
  </div>

  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="490" height="692"></canvas>
    <div id="loading">LOADING...</div>
  </div>

  <div class="footer">CARGO SHIFT &nbsp;·&nbsp; 2026</div>

</div>

<audio id="bgMusic" preload="auto"></audio>

<script>
  const bgMusic = document.getElementById('bgMusic');
  const muteBtn = document.getElementById('muteBtn');
  const menuMusicVolume = 0.18;
  const gameplayMusicVolume = 0.07;
  bgMusic.volume = menuMusicVolume;

  const playlist = [
    { ogg: 'music.ogg', mp3: 'music.mp3' },
    { ogg: 'music_2.ogg', mp3: 'music_2.mp3' },
    { ogg: 'music_3.ogg', mp3: 'music_3.mp3' },
    { ogg: 'music_4.ogg', mp3: 'music_4.mp3' },
  ];
  const lastTrackStorageKey = 'cargo-shift-last-track';
  let currentTrack = -1;
  let musicStarted = false;
  let playbackQueue = [];

  function randomInt(maxExclusive) {
    if (maxExclusive <= 1) {
      return 0;
    }
    if (window.crypto && window.crypto.getRandomValues) {
      const values = new Uint32Array(1);
      window.crypto.getRandomValues(values);
      return values[0] % maxExclusive;
    }
    return Math.floor(Math.random() * maxExclusive);
  }

  function refillPlaybackQueue(lastTrack) {
    playbackQueue = playlist.map((_, index) => index);
    for (let i = playbackQueue.length - 1; i > 0; i -= 1) {
      const j = randomInt(i + 1);
      [playbackQueue[i], playbackQueue[j]] = [playbackQueue[j], playbackQueue[i]];
    }

    if (playbackQueue.length > 1 && playbackQueue[0] === lastTrack) {
      const swapIndex = 1 + randomInt(playbackQueue.length - 1);
      [playbackQueue[0], playbackQueue[swapIndex]] = [playbackQueue[swapIndex], playbackQueue[0]];
    }
  }

  function nextTrackIndex() {
    if (playlist.length === 0) {
      return -1;
    }
    if (playbackQueue.length === 0) {
      refillPlaybackQueue(currentTrack);
    }
    return playbackQueue.shift();
  }

  function preferredTrackUrl(track) {
    if (!track) {
      return '';
    }
    const canPlayOgg = typeof bgMusic.canPlayType === 'function'
      && bgMusic.canPlayType('audio/ogg; codecs=opus') !== '';
    if (canPlayOgg && track.ogg) {
      return track.ogg;
    }
    return track.mp3 || track.ogg || '';
  }

  function loadTrack(index) {
    if (index < 0 || index >= playlist.length) {
      return;
    }
    const track = playlist[index];
    const url = preferredTrackUrl(track);
    if (!url) {
      return;
    }
    bgMusic.pause();
    bgMusic.removeAttribute('src');
    bgMusic.innerHTML = '';
    bgMusic.src = url;
    bgMusic.load();
    try {
      window.localStorage.setItem(lastTrackStorageKey, String(index));
    } catch (_) {}
  }

  function desiredMusicVolume() {
    return window.cargoShiftScene === 'menu' ? menuMusicVolume : gameplayMusicVolume;
  }

  function syncMusicVolume() {
    bgMusic.volume = desiredMusicVolume();
    window.requestAnimationFrame(syncMusicVolume);
  }

  try {
    const storedLastTrack = Number.parseInt(window.localStorage.getItem(lastTrackStorageKey) || '', 10);
    if (!Number.isNaN(storedLastTrack)) {
      currentTrack = storedLastTrack;
    }
  } catch (_) {}

  currentTrack = nextTrackIndex();
  loadTrack(currentTrack);
  syncMusicVolume();

  bgMusic.addEventListener('ended', () => {
    currentTrack = nextTrackIndex();
    loadTrack(currentTrack);
    bgMusic.play().catch(() => {});
  });

  function startMusic() {
    if (musicStarted) return;
    bgMusic.play().then(() => {
      musicStarted = true;
      muteBtn.textContent = '♫';
      muteBtn.classList.remove('muted');
    }).catch(() => {});
  }

  // Start as soon as audio data is buffered
  bgMusic.addEventListener('canplaythrough', startMusic, { once: true });
  startMusic();

  function onFirstInteraction() {
    startMusic();
    if (musicStarted) {
      document.removeEventListener('keydown', onFirstInteraction);
      document.removeEventListener('click', onFirstInteraction);
      document.removeEventListener('touchstart', onFirstInteraction);
    }
  }
  document.addEventListener('keydown', onFirstInteraction);
  document.addEventListener('click', onFirstInteraction);
  document.addEventListener('touchstart', onFirstInteraction);

  function toggleMute() {
    bgMusic.muted = !bgMusic.muted;
    muteBtn.textContent = bgMusic.muted ? '♫̸' : '♫';
    muteBtn.classList.toggle('muted', bgMusic.muted);
  }

  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMute();
  });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyM') {
      toggleMute();
      e.preventDefault();
    }
  });
</script>

<script>
  const monitor = document.getElementById('monitor');
  const themeSelect = document.getElementById('themeSelect');
  const themes = ['theme-amber', 'theme-green', 'theme-cyan'];

  themeSelect.addEventListener('change', () => {
    themes.forEach(t => monitor.classList.remove(t));
    monitor.classList.add(themeSelect.value);
    window.crtTheme = themeSelect.value;
  });
  window.crtTheme = 'theme-amber';

  function cycleTheme() {
    const idx = (themes.indexOf(themeSelect.value) + 1) % themes.length;
    themeSelect.value = themes[idx];
    themes.forEach(t => monitor.classList.remove(t));
    monitor.classList.add(themes[idx]);
    window.crtTheme = themes[idx];
  }

  document.addEventListener('keydown', (e) => {
    if (e.code === 'KeyT') {
      cycleTheme();
      e.preventDefault();
    }
  });

  // Enable HDR automatically when the display supports it.
  const hdrSupported = window.matchMedia('(dynamic-range: high)').matches;
  window.hdrDisplay = hdrSupported;
  window.hdrMode = hdrSupported;

  if (hdrSupported) {
    monitor.classList.add('hdr-mode');
  }
</script>
<script src="wasm_exec.js"></script>
<script>
  const go = new Go();
  WebAssembly.instantiateStreaming(fetch('game.wasm'), go.importObject)
    .then(result => {
      document.getElementById('loading').style.display = 'none';
      go.run(result.instance);
    })
    .catch(err => {
      document.getElementById('loading').textContent = 'ERROR: ' + err.message;
    });
</script>
</body>
</html>
